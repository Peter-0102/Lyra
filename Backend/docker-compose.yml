services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mispoti
      POSTGRES_PASSWORD: mispoti
      POSTGRES_DB: mispoti
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mispoti -d mispoti"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - audio_data:/data
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://mispoti:mispoti@postgres:5432/mispoti
      - AUDIO_DIR=/data/audio
      - FILE_TTL_HOURS=168
      - RATE_LIMIT_MAX=10
      - CORS_ORIGIN=*
      - JWT_SECRET=dev-secret-change-in-production
      - JWT_EXPIRES_IN=15m
      - REFRESH_TOKEN_EXPIRES_IN=7d
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]

  worker:
    build: .
    command: ["node", "dist/queue/audioWorker.js"]
    volumes:
      - audio_data:/data
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://mispoti:mispoti@postgres:5432/mispoti
      - AUDIO_DIR=/data/audio
      - FILE_TTL_HOURS=168
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 2

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  audio_data:
  redis_data:
