services:
  api:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - audio_data:/data
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - REDIS_URL=redis://redis:6379
      - DATABASE_PATH=/data/db.sqlite
      - AUDIO_DIR=/data/audio
      - FILE_TTL_HOURS=168
      - RATE_LIMIT_MAX=10
      - CORS_ORIGIN=*
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]

  worker:
    build: .
    command: ["node", "dist/queue/audioWorker.js"]
    volumes:
      - audio_data:/data
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_PATH=/data/db.sqlite
      - AUDIO_DIR=/data/audio
      - FILE_TTL_HOURS=168
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 2

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - redis_data:/data

volumes:
  audio_data:
  redis_data:
