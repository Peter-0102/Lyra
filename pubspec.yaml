name: mispoti
description: "A production-ready, native mobile music streaming and playback application."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Dependency Injection & State Management
  get_it: ^8.0.3
  flutter_riverpod: ^2.5.1

  # Audio Playback
  just_audio: ^0.9.41
  just_audio_background: ^0.0.1-beta.15

  # Network & YouTube Extraction
  youtube_explode_dart: ^3.1.0
  http: ^1.2.0
  dio: ^5.5.0+1
  path_provider: ^2.1.3

  # Disk Space
  disk_usage: ^1.0.0

  # Secure Storage (tokens)
  flutter_secure_storage: ^9.2.2

  # Local preferences (guest mode, onboarding)
  shared_preferences: ^2.2.2

  # Local Database
  sqflite: ^2.3.0

  # Path utilities (for database path joining)
  path: ^1.9.0

  # Platform & Hardware Integration
  permission_handler: ^11.3.1

  # Navigation
  go_router: ^14.8.0

  # Code Generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # UI / UX Utilities
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
